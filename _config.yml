repository: lexiegardner/lexiegardner.github.io  # Your GitHub repository

remote_theme: "mmistakes/minimal-mistakes@4.1.0" # latest works now
minimal_mistakes_skin: "default"

author:
  name: "Lexie Gardner"
  avatar: "/assets/images/bio-photo.jpg"  # upload your photo here
