  location: "University of California, Berkeley"
  email: "lexie.gardner@berkeley.edu"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:lexie.gardner@berkeley.edu"
    - label: "Google Scholar"
      icon: "fas fa-fw fa-graduation-cap"
      url: "https://scholar.google.com/citations?user=1bUVIDIAAAAJ&hl=en"  # add your Scholar URL
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/lexiegardner"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "www.linkedin.com/in/lexie-gardner-376527212"  # add your LinkedIn URL
      
plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

